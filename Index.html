<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L&K Luxury</title><style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:black;overflow:hidden;}

.scroll-wrapper{
  width:100%;
  height:100vh;
  display:flex;
  align-items:center;
  overflow:hidden;
}

.scroll-track{
  display:flex;
  animation:scroll 20s linear infinite;
}

.card{
  width:300px;
  height:400px;
  margin:20px;
  border-radius:20px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

@keyframes scroll{
  from{transform:translateX(0);} 
  to{transform:translateX(-50%);} 
}

</style></head><body><div class="scroll-wrapper">
  <div class="scroll-track"><div class="card">
  <img src="IMAGE1_HERE">
</div>

<div class="card">
  <img src="IMAGE2_HERE">
</div>

<!-- duplicate for smooth infinite -->
<div class="card">
  <img src="IMAGE1_HERE">
</div>

<div class="card">
  <img src="IMAGE2_HERE">
</div>

  </div>
</div></body>
</html>
