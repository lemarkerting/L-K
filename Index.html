<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L&T WE SELL</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}body {color:white; overflow-x:hidden;}

/* Background Video */
.video-bg {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  filter:brightness(0.6);
}

/* Navbar */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}

nav h1 {
  font-size:28px;
  font-weight:600;
  letter-spacing:2px;
}

nav ul {
  display:flex;
  gap:25px;
  list-style:none;
}

nav ul li {
  cursor:pointer;
  transition:0.3s;
}

nav ul li:hover {color:#ffd700;}

/* Hero */
.hero {
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.hero h2 {
  font-size:50px;
  margin-bottom:10px;
}

.hero p {
  font-size:18px;
  margin-bottom:20px;
}

.btn {
  padding:12px 25px;
  border:none;
  background:#ffd700;
  color:black;
  font-weight:600;
  cursor:pointer;
  border-radius:30px;
  transition:0.3s;
}

.btn:hover {background:white;}

/* Products */
.products {
  padding:60px 40px;
  background:white;
  color:black;
}

.products h2 {
  text-align:center;
  margin-bottom:40px;
  font-size:32px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
  gap:20px;
}

.card {
  background:#f5f5f5;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover {transform:translateY(-10px);}

.card img {
  width:100%;
  height:250px;
  object-fit:cover;
}

.card-content {
  padding:15px;
}

.card-content h3 {margin-bottom:10px;}

.card-content button {
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  background:black;
  color:white;
  cursor:pointer;
  border-radius:10px;
}

footer {
  text-align:center;
  padding:20px;
  background:black;
  color:white;
}

  </style>
</head>
<body>  <!-- Background Video -->  <video autoplay muted loop class="video-bg">
    <source src="https://cdn.coverr.co/videos/coverr-woman-walking-in-heels-5171/1080p.mp4" type="video/mp4">
  </video>  <!-- Navbar -->  <nav>
    <h1>L&T WE SELL</h1>
    <ul>
      <li>Home</li>
      <li>Shop</li>
      <li>About</li>
      <li>Contact</li>
    </ul>
  </nav>  <!-- Hero Section -->  <section class="hero">
    <h2>Luxury Style & Living</h2>
    <p>Dresses • Cologne • Sneakers • Home Decor</p>
    <button class="btn">Shop Now</button>
  </section>  <!-- Products -->  <section class="products">
    <h2>Featured Products</h2>
    <div class="grid"><div class="card">
    <img src="https://images.unsplash.com/photo-1520962918287-7448c2878f65" alt="dress">
    <div class="card-content">
      <h3>Elegant Dress</h3>
      <p>R499</p>
      <button>Buy Now</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1592878849122-5f7a7c84a1b3" alt="cologne">
    <div class="card-content">
      <h3>Luxury Cologne</h3>
      <p>R699</p>
      <button>Buy Now</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="sneakers">
    <div class="card-content">
      <h3>Stylish Sneakers</h3>
      <p>R899</p>
      <button>Buy Now</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85" alt="home decor">
    <div class="card-content">
      <h3>Modern Decor</h3>
      <p>R350</p>
      <button>Buy Now</button>
    </div>
  </div>

</div>

  </section>  <footer>
    <p>© 2026 L&T WE SELL | All Rights Reserved</p>
  </footer></body>
</html>
