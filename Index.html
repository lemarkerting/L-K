<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L&K Luxury</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:black;color:white;overflow-x:hidden;}

/* NAV */
nav{padding:20px 40px;display:flex;justify-content:space-between;}
nav h1{font-family:'Playfair Display';letter-spacing:3px;}

/* HERO */
.hero{height:90vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.hero h2{font-family:'Playfair Display';font-size:50px;}
.btn{margin-top:20px;padding:12px 30px;border:1px solid white;background:none;color:white;cursor:pointer;}

/* SCROLL SECTION */
.scroll-wrapper{overflow:hidden;white-space:nowrap;margin:40px 0;}
.scroll-track{display:inline-flex;animation:scroll 20s linear infinite;}

.card{width:180px;height:250px;margin:10px;background:#111;border-radius:15px;overflow:hidden;cursor:pointer;}
.card img{width:100%;height:100%;object-fit:cover;}

@keyframes scroll{
  from{transform:translateX(0);} 
  to{transform:translateX(-50%);} 
}

/* FLOAT WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;right:20px;
background:#25D366;
padding:15px;border-radius:50%;cursor:pointer;
}

</style></head><body><nav>
<h1>L&K</h1>
</nav><section class="hero">
<h2>Luxury Collection</h2>
<button class="btn">Explore</button>
</section><!-- DRESSES --><div class="scroll-wrapper">
<div class="scroll-track"><div class="card" onclick="order('Dress','R500','S,M,L','Red/Black')">
<img src="https://images.unsplash.com/photo-1520962918287-7448c2878f65">
</div><div class="card" onclick="order('Dress','R600','S,M,L','White')">
<img src="https://images.unsplash.com/photo-1495121605193-b116b5b09a0e">
</div><!-- duplicate for infinite effect --><div class="card" onclick="order('Dress','R500','S,M,L','Red/Black')">
<img src="https://images.unsplash.com/photo-1520962918287-7448c2878f65">
</div><div class="card" onclick="order('Dress','R600','S,M,L','White')">
<img src="https://images.unsplash.com/photo-1495121605193-b116b5b09a0e">
</div></div>
</div><!-- SNEAKERS --><div class="scroll-wrapper">
<div class="scroll-track"><div class="card" onclick="order('Sneakers','R900','6-10','White/Black')">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
</div><div class="card" onclick="order('Sneakers','R950','6-10','Grey')">
<img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba6">
</div><div class="card" onclick="order('Sneakers','R900','6-10','White/Black')">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
</div><div class="card" onclick="order('Sneakers','R950','6-10','Grey')">
<img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba6">
</div></div>
</div><!-- WHATSAPP --><div class="whatsapp" onclick="quickChat()">💬</div><script>
const phone = "27XXXXXXXXX";

function order(product, price, sizes, colors){
const msg = `Hi, I want to order:\n\nProduct: ${product}\nPrice: ${price}\nSizes: ${sizes}\nColors: ${colors}\n\nMy Size:\nMy Address:`;
window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

function quickChat(){
window.open(`https://wa.me/${phone}?text=Hi, I'm interested in your products`);
}
</script></body>
</html>
